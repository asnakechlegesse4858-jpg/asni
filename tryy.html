<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <div id="product_list"></div>
<script>
 async function ecommerse(){
    try{
        const response=await fetch('tr.json')
        const data=await response.json();
        data.forEach(element => {
        const output =`ስም፡ ${(element.name)} ${(element.price)}`
        
        });
document.getElementById("product_list").innerHTML=output  
    }
     catch(error){
        document.getElementById("product_list").textContent=`data is not found`
     }

 }   
</script>

</body>
</html>
