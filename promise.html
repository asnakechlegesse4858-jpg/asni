<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>አሪፍፔ መረጃ ማሳያ</title>
</head>
<body>

    <div id="profile">መረጃው በመጫን ላይ ነው...</div>

    <script>
       async function getArifpayData() {
           try {
               const response = await fetch('https://jsonplaceholder.typicode.com/users/1');
               const data = await response.json();
               
               let output = `ስም፡ ${data.name}<br>ኢሜይል፡ ${data.email}`;
               document.getElementById("profile").innerHTML = output;
           } catch (error) {
               document.getElementById("profile").textContent = "መረጃውን ማግኘት አልተቻለም።";
           }
       }
       
       getArifpayData();
    </script>
     
</body>
</html>
